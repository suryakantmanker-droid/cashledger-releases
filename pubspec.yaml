name: expense_tracker
description: Professional Expense & Employee Money Tracking System
publish_to: none
version: 1.1.2+4

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase (Messaging only — Auth & database are Supabase)
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2

  # Supabase (primary database)
  supabase_flutter: ^2.8.0

  # State Management
  flutter_riverpod: ^3.0.0-dev.3
  riverpod_annotation: ^3.0.0-dev.3

  # Navigation
  go_router: ^17.2.3

  # UI
  flutter_screenutil: ^5.9.3
  google_fonts: ^8.1.0
  fl_chart: ^1.2.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_animate: ^4.5.0

  # File Handling
  image_picker: ^1.1.2
  file_picker: ^10.3.3
  path_provider: ^2.1.4
  permission_handler: ^12.0.1
  flutter_pdfview: ^1.3.2
  photo_view: ^0.15.0

  # Forms & Validation
  reactive_forms: ^18.2.2

  # HTTP client (PDF download for preview)
  dio: ^5.8.0

  # Utilities
  path: ^1.9.0
  intl: ^0.20.2
  uuid: ^4.5.1
  equatable: ^2.0.5
  dartz: ^0.10.1
  connectivity_plus: ^7.1.1
  app_links: ^6.3.2
  package_info_plus: ^8.1.2
  url_launcher: ^6.3.1
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  shared_preferences: ^2.3.3
  logger: ^2.4.0
  flutter_local_notifications: ^21.0.0
  app_badge_plus: ^1.0.0

  # PDF Generation
  pdf: ^3.11.1
  printing: ^5.13.2

  # Charts & Reports
  syncfusion_flutter_charts: ^33.2.7

  # Image Compression
  flutter_image_compress: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^3.0.0-dev.11
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#0F1740"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"
  web:
    generate: false
  windows:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
